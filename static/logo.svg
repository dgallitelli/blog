<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2d2a"/>
      <stop offset="100%" stop-color="#08090a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg-glow)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.3"/>

  <!-- Connections: input → latent (teal, varying weight) -->
  <line x1="130" y1="150" x2="240" y2="200" stroke="#5eead4" stroke-width="1.5" opacity="0.25"/>
  <line x1="130" y1="150" x2="240" y2="310" stroke="#5eead4" stroke-width="1" opacity="0.1"/>
  <line x1="130" y1="256" x2="240" y2="200" stroke="#5eead4" stroke-width="1.5" opacity="0.2"/>
  <line x1="130" y1="256" x2="240" y2="310" stroke="#5eead4" stroke-width="1.5" opacity="0.25"/>
  <line x1="130" y1="362" x2="240" y2="200" stroke="#5eead4" stroke-width="1" opacity="0.1"/>
  <line x1="130" y1="362" x2="240" y2="310" stroke="#5eead4" stroke-width="1.5" opacity="0.2"/>

  <!-- Connections: latent → output (teal, varying weight) -->
  <line x1="272" y1="200" x2="382" y2="150" stroke="#5eead4" stroke-width="1.5" opacity="0.25"/>
  <line x1="272" y1="200" x2="382" y2="256" stroke="#5eead4" stroke-width="1.5" opacity="0.2"/>
  <line x1="272" y1="200" x2="382" y2="362" stroke="#5eead4" stroke-width="1" opacity="0.1"/>
  <line x1="272" y1="310" x2="382" y2="150" stroke="#5eead4" stroke-width="1" opacity="0.1"/>
  <line x1="272" y1="310" x2="382" y2="256" stroke="#5eead4" stroke-width="1.5" opacity="0.2"/>
  <line x1="272" y1="310" x2="382" y2="362" stroke="#5eead4" stroke-width="1.5" opacity="0.25"/>

  <!-- Input layer nodes -->
  <circle cx="130" cy="150" r="8" fill="#5eead4" opacity="0.4"/>
  <circle cx="130" cy="256" r="8" fill="#5eead4" opacity="0.4"/>
  <circle cx="130" cy="362" r="8" fill="#5eead4" opacity="0.4"/>

  <!-- Latent layer nodes (larger, glowing) -->
  <circle cx="256" cy="200" r="16" fill="#5eead4" opacity="0.12"/>
  <circle cx="256" cy="200" r="10" fill="#5eead4" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="310" r="16" fill="#5eead4" opacity="0.12"/>
  <circle cx="256" cy="310" r="10" fill="#5eead4" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Output layer nodes -->
  <circle cx="382" cy="150" r="8" fill="#5eead4" opacity="0.4"/>
  <circle cx="382" cy="256" r="8" fill="#5eead4" opacity="0.4"/>
  <circle cx="382" cy="362" r="8" fill="#5eead4" opacity="0.4"/>
</svg>
