<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0d2d2a"/>
      <stop offset="100%" stop-color="#08090a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg-glow)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.3"/>

  <!-- Connections: input → latent -->
  <line x1="118" y1="120" x2="236" y2="175" stroke="#5eead4" stroke-width="1.8" opacity="0.25"/>
  <line x1="118" y1="120" x2="236" y2="280" stroke="#5eead4" stroke-width="1.2" opacity="0.1"/>
  <line x1="118" y1="225" x2="236" y2="175" stroke="#5eead4" stroke-width="1.8" opacity="0.2"/>
  <line x1="118" y1="225" x2="236" y2="280" stroke="#5eead4" stroke-width="1.8" opacity="0.25"/>
  <line x1="118" y1="330" x2="236" y2="175" stroke="#5eead4" stroke-width="1.2" opacity="0.1"/>
  <line x1="118" y1="330" x2="236" y2="280" stroke="#5eead4" stroke-width="1.8" opacity="0.2"/>

  <!-- Connections: latent → output -->
  <line x1="276" y1="175" x2="394" y2="120" stroke="#5eead4" stroke-width="1.8" opacity="0.25"/>
  <line x1="276" y1="175" x2="394" y2="225" stroke="#5eead4" stroke-width="1.8" opacity="0.2"/>
  <line x1="276" y1="175" x2="394" y2="330" stroke="#5eead4" stroke-width="1.2" opacity="0.1"/>
  <line x1="276" y1="280" x2="394" y2="120" stroke="#5eead4" stroke-width="1.2" opacity="0.1"/>
  <line x1="276" y1="280" x2="394" y2="225" stroke="#5eead4" stroke-width="1.8" opacity="0.2"/>
  <line x1="276" y1="280" x2="394" y2="330" stroke="#5eead4" stroke-width="1.8" opacity="0.25"/>

  <!-- Input layer nodes -->
  <circle cx="118" cy="120" r="14" fill="#5eead4" opacity="0.45"/>
  <circle cx="118" cy="225" r="14" fill="#5eead4" opacity="0.45"/>
  <circle cx="118" cy="330" r="14" fill="#5eead4" opacity="0.45"/>

  <!-- Latent layer nodes (larger, glowing) -->
  <circle cx="256" cy="175" r="24" fill="#5eead4" opacity="0.1"/>
  <circle cx="256" cy="175" r="16" fill="#5eead4" opacity="0.75" filter="url(#glow)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="280" r="24" fill="#5eead4" opacity="0.1"/>
  <circle cx="256" cy="280" r="16" fill="#5eead4" opacity="0.75" filter="url(#glow)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Output layer nodes -->
  <circle cx="394" cy="120" r="14" fill="#5eead4" opacity="0.45"/>
  <circle cx="394" cy="225" r="14" fill="#5eead4" opacity="0.45"/>
  <circle cx="394" cy="330" r="14" fill="#5eead4" opacity="0.45"/>

  <!-- DG text below the network -->
  <text x="256" y="420" text-anchor="middle" font-family="'Space Mono', monospace" font-weight="700" font-size="64" fill="#5eead4" opacity="0.6" letter-spacing="8">DG</text>
</svg>
