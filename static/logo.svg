<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6cb4ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0a" stroke="url(#grad)" stroke-width="4"/>

  <!-- Neural network nodes (latent space representation) -->
  <!-- Input layer (left) -->
  <circle cx="120" cy="160" r="8" fill="#6cb4ee" opacity="0.5"/>
  <circle cx="120" cy="256" r="8" fill="#6cb4ee" opacity="0.5"/>
  <circle cx="120" cy="352" r="8" fill="#6cb4ee" opacity="0.5"/>

  <!-- Hidden/latent layer (center) - larger, brighter -->
  <circle cx="256" cy="190" r="12" fill="url(#grad)" opacity="0.8"/>
  <circle cx="256" cy="320" r="12" fill="url(#grad)" opacity="0.8"/>

  <!-- Output layer (right) -->
  <circle cx="392" cy="160" r="8" fill="#a78bfa" opacity="0.5"/>
  <circle cx="392" cy="256" r="8" fill="#a78bfa" opacity="0.5"/>
  <circle cx="392" cy="352" r="8" fill="#a78bfa" opacity="0.5"/>

  <!-- Connections: input → hidden -->
  <line x1="128" y1="160" x2="244" y2="190" stroke="#6cb4ee" stroke-width="1.2" opacity="0.2"/>
  <line x1="128" y1="160" x2="244" y2="320" stroke="#6cb4ee" stroke-width="1.2" opacity="0.12"/>
  <line x1="128" y1="256" x2="244" y2="190" stroke="#6cb4ee" stroke-width="1.2" opacity="0.2"/>
  <line x1="128" y1="256" x2="244" y2="320" stroke="#6cb4ee" stroke-width="1.2" opacity="0.2"/>
  <line x1="128" y1="352" x2="244" y2="190" stroke="#6cb4ee" stroke-width="1.2" opacity="0.12"/>
  <line x1="128" y1="352" x2="244" y2="320" stroke="#6cb4ee" stroke-width="1.2" opacity="0.2"/>

  <!-- Connections: hidden → output -->
  <line x1="268" y1="190" x2="384" y2="160" stroke="#a78bfa" stroke-width="1.2" opacity="0.2"/>
  <line x1="268" y1="190" x2="384" y2="256" stroke="#a78bfa" stroke-width="1.2" opacity="0.2"/>
  <line x1="268" y1="190" x2="384" y2="352" stroke="#a78bfa" stroke-width="1.2" opacity="0.12"/>
  <line x1="268" y1="320" x2="384" y2="160" stroke="#a78bfa" stroke-width="1.2" opacity="0.12"/>
  <line x1="268" y1="320" x2="384" y2="256" stroke="#a78bfa" stroke-width="1.2" opacity="0.2"/>
  <line x1="268" y1="320" x2="384" y2="352" stroke="#a78bfa" stroke-width="1.2" opacity="0.2"/>


</svg>
