{{ define "main" }}
<section class="hero">
    <h1>{{ .Site.Title }}</h1>
    <p class="hero-subtitle">{{ .Site.Params.description }}</p>
</section>

<section class="posts">
    {{ range where .Site.RegularPages "Section" "ne" "" }}
    {{ if not .Params.hidden }}
    <a class="post-card" href="{{ .RelPermalink }}">
        <div class="post-meta">
            <span class="post-date">{{ .Date.Format "Jan 2, 2006" }}</span>
            <div class="post-tags">
                {{ range .Params.tags }}<span class="post-tag">{{ . }}</span>{{ end }}
            </div>
        </div>
        <div class="post-title">{{ .Title }}</div>
        <div class="post-summary">{{ .Params.summary }}</div>
    </a>
    {{ end }}
    {{ end }}
</section>
{{ end }}
