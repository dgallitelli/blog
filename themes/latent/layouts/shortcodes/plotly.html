{{- $json := .Get "json" -}}
{{- $height := .Get "height" | default "450px" -}}
{{- $caption := .Get "caption" | default "" -}}
{{- $id := printf "plotly-%s" (md5 $json) -}}

<figure class="plotly-figure" style="margin: 1.75rem 0;">
  <div id="{{ $id }}" style="height: {{ $height }}; width: 100%;"></div>
  {{- if $caption }}
  <figcaption style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; font-style: italic; text-align: center;">
    {{ $caption }}
  </figcaption>
  {{- end }}
</figure>

<script>
(function() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  fetch('{{ $json }}')
    .then(function(r) { return r.json(); })
    .then(function(fig) {
      var layout = Object.assign({}, fig.layout || {}, {
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: isDark ? 'rgba(13,15,17,0.6)' : 'rgba(245,246,248,0.6)',
        font: {
          color: isDark ? '#c8cdd3' : '#2d3748',
          family: 'Source Serif 4, Georgia, serif'
        }
      });
      /* preserve nested objects the assign would clobber */
      if (fig.layout && fig.layout.title) layout.title = fig.layout.title;
      if (fig.layout && fig.layout.xaxis) layout.xaxis = Object.assign({}, fig.layout.xaxis);
      if (fig.layout && fig.layout.yaxis) layout.yaxis = Object.assign({}, fig.layout.yaxis);
      if (fig.layout && fig.layout.yaxis2) layout.yaxis2 = Object.assign({}, fig.layout.yaxis2);
      if (fig.layout && fig.layout.shapes) layout.shapes = fig.layout.shapes;
      if (fig.layout && fig.layout.annotations) layout.annotations = fig.layout.annotations;
      if (fig.layout && fig.layout.sliders) layout.sliders = fig.layout.sliders;
      if (fig.layout && fig.layout.updatemenus) layout.updatemenus = fig.layout.updatemenus;
      if (fig.layout && fig.layout.legend) layout.legend = fig.layout.legend;
      if (fig.layout && fig.layout.margin) layout.margin = fig.layout.margin;
      if (fig.layout && fig.layout.bargap !== undefined) layout.bargap = fig.layout.bargap;

      Plotly.newPlot('{{ $id }}', fig.data, layout, {
        responsive: true,
        displayModeBar: true,
        modeBarButtonsToRemove: ['sendDataToCloud', 'lasso2d', 'select2d', 'autoScale2d'],
        displaylogo: false
      });
    });
})();
</script>
